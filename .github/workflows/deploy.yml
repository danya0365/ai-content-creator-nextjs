# ============================================
# GitHub Actions - Automatic Deployment to VPS
# ============================================
#
# This workflow will:
# 1. Run Lint & Type Check for quality assurance
# 2. SSH into the VPS (95.216.221.18)
# 3. Pull the latest code from 'release-vps'
# 4. Run the automated setup-nextjs-vps-existing.sh 
#    to handle dynamic ports, Docker build, and Nginx.
#
# ============================================

name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - release-vps
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

env:
  NODE_VERSION: '22'
  APP_PATH: '/opt/nextjs-ai-creator'

jobs:
  # ==========================================
  # Job 1: Quality Check
  # ==========================================
  quality-check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📚 Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: 🔍 Type check
        run: yarn type-check

      - name: 🧹 Lint
        run: yarn lint || echo "Lint warnings found, continuing..."

  # ==========================================
  # Job 2: Deploy to VPS
  # ==========================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
      - name: 🔐 SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            echo "============================================"
            echo "🚀 Starting deployment on VPS..."
            echo "============================================"
            
            # Navigate to the app directory
            cd ${{ env.APP_PATH }}
            
            # Update source code
            echo "📥 Fetching latest code from release-vps..."
            git fetch origin release-vps
            git reset --hard origin/release-vps
            
            # Fix permissions
            chmod +x nextjs-vps/*.sh
            
            # Execute the isolated deployment script
            # This handles port detection, .env sync, docker build, and nginx
            echo "🔄 Running automated setup script..."
            sudo BUILD_COMMIT_SHA=${{ github.sha }} ./nextjs-vps/setup-nextjs-vps-existing.sh
            
            echo "============================================"
            echo "✅ Deployment Successful!"
            echo "============================================"

  # ==========================================
  # Job 3: Notification
  # ==========================================
  notify:
    name: 📢 Status Update
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "SUCCESS: App deployed to https://social-generator.vibify.site"
          else
            echo "FAILURE: Deployment failed. Please check logs."
          fi
