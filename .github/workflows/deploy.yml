# ============================================
# GitHub Actions - Automatic Deployment to VPS
# ============================================
#
# This workflow will:
# 1. Run Lint & Type Check for quality assurance
# 2. SSH into the VPS (95.216.221.18)
# 3. Pull the latest code from 'release-vps'
# 4. Run the automated setup-nextjs-vps-existing.sh 
#    to handle dynamic ports, Docker build, and Nginx.
#
# ============================================

name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - release-vps
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

env:
  NODE_VERSION: '22'
  APP_PATH: '/opt/nextjs-ai-creator'

jobs:
  # ==========================================
  # Job 1: Quality Check
  # ==========================================
  quality-check:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: 📚 Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: 🔍 Type check
        run: yarn type-check

      - name: 🧹 Lint
        run: yarn lint || echo "Lint warnings found, continuing..."

  # ==========================================
  # Job 2: Deploy to VPS
  # ==========================================
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality-check
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📤 Upload Code to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "./*"
          target: ${{ env.APP_PATH }}
          rm: false # Keep existing files (like .env.production.vps)

      - name: 🔐 SSH Execute Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            echo "============================================"
            echo "🚀 Starting isolated deployment on VPS..."
            echo "============================================"
            
            # Navigate to the app directory
            cd ${{ env.APP_PATH }}
            
            # Fix permissions for the uploaded scripts
            chmod +x nextjs-vps/*.sh
            
            # Execute the isolated deployment script
            # This handles port detection, .env sync, docker build, and nginx
            echo "🔄 Running automated setup script..."
            echo "${{ secrets.VPS_PASSWORD }}" | sudo -S BUILD_COMMIT_SHA=${{ github.sha }} ./nextjs-vps/setup-nextjs-vps-existing.sh
            
            echo "============================================"
            echo "✅ Deployment Successful!"
            echo "============================================"

  # ==========================================
  # Job 3: Status Notification
  # ==========================================
  notify:
    name: 📢 Status Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always() # Runs even if previous jobs failed
    
    steps:
      - name: 🟢 Success Notification
        if: needs.deploy.result == 'success'
        run: echo "SUCCESS - Application deployed successfully!"

      - name: 🔴 Failure Notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "FAILURE - Deployment failed!"
          exit 1 # This will make THIS job also show as failed (red)
